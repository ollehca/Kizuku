<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backend API Test</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        background: #1e1e1e;
        color: #ffffff;
      }
      h1 {
        color: #61dafb;
      }
      .section {
        background: #2d2d2d;
        padding: 20px;
        margin: 20px 0;
        border-radius: 8px;
      }
      button {
        background: #61dafb;
        color: #000;
        border: none;
        padding: 10px 20px;
        margin: 5px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover {
        background: #4fa8c5;
      }
      .output {
        background: #1a1a1a;
        padding: 15px;
        margin: 10px 0;
        border-radius: 4px;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        white-space: pre-wrap;
        max-height: 300px;
        overflow-y: auto;
      }
      .success {
        color: #4caf50;
      }
      .error {
        color: #f44336;
      }
      input {
        background: #1a1a1a;
        color: #ffffff;
        border: 1px solid #444;
        padding: 8px;
        margin: 5px;
        border-radius: 4px;
        font-size: 14px;
      }
      .status {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 5px;
      }
      .status.ready {
        background: #4caf50;
      }
      .status.not-ready {
        background: #f44336;
      }
    </style>
  </head>
  <body>
    <h1>🚀 Kizu Backend API Test Page</h1>

    <div class="section">
      <h2>System Status</h2>
      <button onclick="checkStatus()">Check Status</button>
      <button onclick="checkInitialization()">Check Initialization</button>
      <div id="status-output" class="output">Click buttons to test...</div>
    </div>

    <div class="section">
      <h2>Configuration</h2>
      <button onclick="getFullConfig()">Get Full Config</button>
      <button onclick="getLicenseType()">Get License Type</button>
      <button onclick="checkFeature('collaboration')">Check Collaboration</button>
      <button onclick="checkFeature('cloudSync')">Check Cloud Sync</button>
      <button onclick="checkFeature('versionHistory')">Check Version History</button>
      <div id="config-output" class="output">Click buttons to test...</div>
    </div>

    <div class="section">
      <h2>Authentication</h2>
      <button onclick="getAuthState()">Get Auth State</button>
      <button onclick="checkAccount()">Check Has Account</button>
      <div>
        <input type="text" id="username" placeholder="Username" value="testuser" />
        <input type="password" id="password" placeholder="Password" value="test123" />
        <button onclick="authenticate()">Authenticate</button>
      </div>
      <button onclick="logout()">Logout</button>
      <div id="auth-output" class="output">Click buttons to test...</div>
    </div>

    <div class="section">
      <h2>Storage</h2>
      <button onclick="listFiles('images')">List Images</button>
      <button onclick="listFiles('data')">List Data Files</button>
      <div>
        <input type="text" id="file-name" placeholder="File name" value="test.txt" />
        <input type="text" id="file-data" placeholder="File data" value="Hello from Kizu!" />
        <button onclick="storeTestFile()">Store File</button>
        <button onclick="retrieveTestFile()">Retrieve File</button>
        <button onclick="deleteTestFile()">Delete File</button>
      </div>
      <div id="storage-output" class="output">Click buttons to test...</div>
    </div>

    <script src="backend-client.js"></script>
    <script>
      let client;

      // Initialize client on load
      window.addEventListener('DOMContentLoaded', async () => {
        try {
          client = window.getBackendClient();
          log('✅ Backend client initialized');
          await checkStatus();
        } catch (error) {
          log('❌ Failed to initialize backend client: ' + error.message, 'error');
        }
      });

      function log(message, type = 'success') {
        console.log(message);
      }

      function updateOutput(elementId, content, isError = false) {
        const element = document.getElementById(elementId);
        const className = isError ? 'error' : 'success';
        const timestamp = new Date().toLocaleTimeString();
        element.innerHTML = `<span class="${className}">[${timestamp}]</span>\n${content}`;
      }

      // System Status Tests
      async function checkStatus() {
        try {
          const status = await client.getServiceStatus();
          updateOutput('status-output', JSON.stringify(status, null, 2));
        } catch (error) {
          updateOutput('status-output', 'Error: ' + error.message, true);
        }
      }

      async function checkInitialization() {
        try {
          const initialized = await client.isInitialized();
          updateOutput('status-output', `Initialized: ${initialized}`);
        } catch (error) {
          updateOutput('status-output', 'Error: ' + error.message, true);
        }
      }

      // Config Tests
      async function getFullConfig() {
        try {
          const config = await client.getConfig();
          updateOutput('config-output', JSON.stringify(config, null, 2));
        } catch (error) {
          updateOutput('config-output', 'Error: ' + error.message, true);
        }
      }

      async function getLicenseType() {
        try {
          const licenseType = await client.getLicenseType();
          updateOutput('config-output', `License Type: ${licenseType}`);
        } catch (error) {
          updateOutput('config-output', 'Error: ' + error.message, true);
        }
      }

      async function checkFeature(featureName) {
        try {
          const enabled = await client.isFeatureEnabled(featureName);
          updateOutput(
            'config-output',
            `Feature "${featureName}": ${enabled ? 'ENABLED' : 'DISABLED'}`
          );
        } catch (error) {
          updateOutput('config-output', 'Error: ' + error.message, true);
        }
      }

      // Auth Tests
      async function getAuthState() {
        try {
          const state = await client.getAuthState();
          updateOutput('auth-output', JSON.stringify(state, null, 2));
        } catch (error) {
          updateOutput('auth-output', 'Error: ' + error.message, true);
        }
      }

      async function checkAccount() {
        try {
          const hasAccount = await client.hasAccount();
          updateOutput('auth-output', `Has Account: ${hasAccount}`);
        } catch (error) {
          updateOutput('auth-output', 'Error: ' + error.message, true);
        }
      }

      async function authenticate() {
        try {
          const username = document.getElementById('username').value;
          const password = document.getElementById('password').value;

          const result = await client.authenticate({ username, password, rememberMe: true });
          updateOutput('auth-output', JSON.stringify(result, null, 2));
        } catch (error) {
          updateOutput('auth-output', 'Error: ' + error.message, true);
        }
      }

      async function logout() {
        try {
          const success = await client.logout();
          updateOutput('auth-output', `Logout: ${success ? 'SUCCESS' : 'FAILED'}`);
        } catch (error) {
          updateOutput('auth-output', 'Error: ' + error.message, true);
        }
      }

      // Storage Tests
      async function listFiles(category) {
        try {
          const files = await client.listFiles(category);
          updateOutput(
            'storage-output',
            `Files in "${category}":\n${JSON.stringify(files, null, 2)}`
          );
        } catch (error) {
          updateOutput('storage-output', 'Error: ' + error.message, true);
        }
      }

      async function storeTestFile() {
        try {
          const fileName = document.getElementById('file-name').value;
          const fileData = document.getElementById('file-data').value;

          await client.storeFile('data', fileName, fileData);
          updateOutput('storage-output', `File "${fileName}" stored successfully`);
        } catch (error) {
          updateOutput('storage-output', 'Error: ' + error.message, true);
        }
      }

      async function retrieveTestFile() {
        try {
          const fileName = document.getElementById('file-name').value;
          const data = await client.retrieveFile('data', fileName);
          updateOutput('storage-output', `File "${fileName}" content:\n${data}`);
        } catch (error) {
          updateOutput('storage-output', 'Error: ' + error.message, true);
        }
      }

      async function deleteTestFile() {
        try {
          const fileName = document.getElementById('file-name').value;
          await client.deleteFile('data', fileName);
          updateOutput('storage-output', `File "${fileName}" deleted successfully`);
        } catch (error) {
          updateOutput('storage-output', 'Error: ' + error.message, true);
        }
      }
    </script>
  </body>
</html>
