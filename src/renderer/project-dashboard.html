<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kizu - Project Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #333;
      }

      .dashboard-container {
        width: 90%;
        max-width: 1200px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 40px;
        animation: slideUp 0.5s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
      }

      .header h1 {
        font-size: 32px;
        color: #667eea;
        font-weight: 700;
      }

      .header-actions {
        display: flex;
        gap: 15px;
      }

      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      .btn-secondary {
        background: #f0f0f0;
        color: #333;
      }

      .btn-secondary:hover {
        background: #e0e0e0;
      }

      .section {
        margin-bottom: 40px;
      }

      .section-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 20px;
        color: #333;
      }

      .quick-actions {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .action-card {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        padding: 30px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s;
        text-align: center;
      }

      .action-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      }

      .action-card-icon {
        font-size: 48px;
        margin-bottom: 15px;
      }

      .action-card-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #333;
      }

      .action-card-desc {
        font-size: 14px;
        color: #666;
      }

      .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
      }

      .project-card {
        background: white;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.3s;
      }

      .project-card:hover {
        border-color: #667eea;
        transform: translateY(-3px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
      }

      .project-thumbnail {
        width: 100%;
        height: 180px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 64px;
        color: white;
      }

      .project-info {
        padding: 20px;
      }

      .project-name {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #333;
      }

      .project-meta {
        font-size: 12px;
        color: #999;
        display: flex;
        justify-content: space-between;
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #999;
      }

      .empty-state-icon {
        font-size: 64px;
        margin-bottom: 20px;
        opacity: 0.3;
      }

      .empty-state-text {
        font-size: 18px;
        margin-bottom: 10px;
      }

      .empty-state-subtext {
        font-size: 14px;
      }

      /* Modal Styles */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        animation: fadeIn 0.2s;
      }

      .modal-overlay.active {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .modal {
        background: white;
        border-radius: 16px;
        padding: 40px;
        width: 90%;
        max-width: 500px;
        animation: modalSlideUp 0.3s ease-out;
      }

      @keyframes modalSlideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .modal-title {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 24px;
        color: #333;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #333;
      }

      .form-input {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        transition: border-color 0.2s;
      }

      .form-input:focus {
        outline: none;
        border-color: #667eea;
      }

      .form-textarea {
        resize: vertical;
        min-height: 80px;
      }

      .modal-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 30px;
      }

      .status-message {
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }

      .status-message.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .status-message.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .status-message.active {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="dashboard-container">
      <!-- Header -->
      <div class="header">
        <h1>築 Kizu Projects</h1>
        <div class="header-actions">
          <button class="btn btn-secondary" id="settingsBtn">⚙️ Settings</button>
          <button class="btn btn-primary" id="newProjectBtn">✨ New Project</button>
        </div>
      </div>

      <!-- Status Message -->
      <div id="statusMessage" class="status-message"></div>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <div class="action-card" id="createBlankProject">
          <div class="action-card-icon">📄</div>
          <div class="action-card-title">Blank Project</div>
          <div class="action-card-desc">Start with an empty canvas</div>
        </div>

        <div class="action-card" id="openExistingProject">
          <div class="action-card-icon">📁</div>
          <div class="action-card-title">Open Project</div>
          <div class="action-card-desc">Browse for .kizu files</div>
        </div>

        <div class="action-card" id="importFromFigma">
          <div class="action-card-icon">📥</div>
          <div class="action-card-title">Import Figma</div>
          <div class="action-card-desc">Import Figma designs</div>
        </div>
      </div>

      <!-- Recent Projects -->
      <div class="section">
        <div class="section-title">Recent Projects</div>
        <div id="recentProjectsContainer" class="projects-grid">
          <!-- Projects will be loaded here -->
        </div>
      </div>
    </div>

    <!-- New Project Modal -->
    <div id="newProjectModal" class="modal-overlay">
      <div class="modal">
        <div class="modal-title">Create New Project</div>
        <form id="newProjectForm">
          <div class="form-group">
            <label class="form-label" for="projectName">Project Name *</label>
            <input
              type="text"
              id="projectName"
              class="form-input"
              placeholder="My Awesome Design"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="projectDescription">Description</label>
            <textarea
              id="projectDescription"
              class="form-input form-textarea"
              placeholder="What's this project about?"
            ></textarea>
          </div>

          <div class="form-group">
            <label class="form-label" for="authorName">Author Name</label>
            <input type="text" id="authorName" class="form-input" placeholder="Your Name" />
          </div>

          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
            <button type="submit" class="btn btn-primary">Create Project</button>
          </div>
        </form>
      </div>
    </div>

    <script src="project-dashboard.js"></script>
  </body>
</html>
