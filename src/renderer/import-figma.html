<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Import Figma File - Kizu</title>
    <link rel="stylesheet" href="../styles/kizu-palette.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell,
          sans-serif;
        background: var(--kizu-accent-gradient);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--kizu-text);
        padding: 20px;
      }

      .import-container {
        width: 90%;
        max-width: 700px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 40px;
        animation: slideUp 0.4s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        margin-bottom: 30px;
      }

      .header h1 {
        font-size: 28px;
        color: var(--kizu-primary);
        font-weight: 700;
        margin-bottom: 10px;
      }

      .header p {
        font-size: 14px;
        color: #666;
      }

      /* Drop Zone */
      .drop-zone {
        border: 3px dashed #d0d0d0;
        border-radius: 12px;
        padding: 60px 40px;
        text-align: center;
        background: #f9f9f9;
        transition: all 0.3s;
        cursor: pointer;
        position: relative;
      }

      .drop-zone:hover {
        border-color: var(--kizu-primary);
        background: #f0f4ff;
      }

      .drop-zone.drag-over {
        border-color: var(--kizu-primary);
        background: #e8eeff;
        transform: scale(1.02);
      }

      .drop-zone-icon {
        font-size: 64px;
        margin-bottom: 20px;
        opacity: 0.5;
      }

      .drop-zone-text {
        font-size: 18px;
        font-weight: 600;
        color: var(--kizu-text);
        margin-bottom: 10px;
      }

      .drop-zone-subtext {
        font-size: 14px;
        color: #999;
        margin-bottom: 20px;
      }

      .drop-zone input[type='file'] {
        display: none;
      }

      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .btn-primary {
        background: var(--kizu-accent-gradient);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      .btn-secondary {
        background: #f0f0f0;
        color: var(--kizu-text);
      }

      .btn-secondary:hover {
        background: #e0e0e0;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
      }

      /* File List */
      .file-list {
        margin: 30px 0;
        display: none;
      }

      .file-list.visible {
        display: block;
      }

      .file-list h3 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 15px;
        color: var(--kizu-text);
      }

      .file-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px;
        background: #f9f9f9;
        border-radius: 8px;
        margin-bottom: 10px;
        border: 2px solid transparent;
        transition: all 0.2s;
      }

      .file-item:hover {
        border-color: var(--kizu-primary);
        background: #f0f4ff;
      }

      .file-item.error {
        border-color: #ff4444;
        background: #fff0f0;
      }

      .file-info {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .file-icon {
        font-size: 24px;
      }

      .file-details {
        flex: 1;
      }

      .file-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--kizu-text);
        margin-bottom: 4px;
      }

      .file-meta {
        font-size: 12px;
        color: #999;
      }

      .file-status {
        font-size: 12px;
        padding: 4px 12px;
        border-radius: 12px;
        font-weight: 600;
      }

      .file-status.validating {
        background: #fff4e5;
        color: #f57c00;
      }

      .file-status.valid {
        background: #e8f5e9;
        color: #2e7d32;
      }

      .file-status.error {
        background: #ffebee;
        color: #c62828;
      }

      .file-remove {
        background: none;
        border: none;
        font-size: 20px;
        color: #999;
        cursor: pointer;
        padding: 8px;
        border-radius: 4px;
        transition: all 0.2s;
      }

      .file-remove:hover {
        background: #ffe5e5;
        color: #ff4444;
      }

      /* Import Options */
      .import-options {
        margin: 30px 0;
        padding: 20px;
        background: #f9f9f9;
        border-radius: 12px;
      }

      .import-options h3 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 15px;
        color: var(--kizu-text);
      }

      .option-item {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .option-item input[type='checkbox'] {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .option-item label {
        font-size: 14px;
        color: #666;
        cursor: pointer;
        user-select: none;
      }

      /* Actions */
      .actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 30px;
      }

      /* Status Messages */
      .status-message {
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
        animation: fadeIn 0.3s;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .status-message.visible {
        display: block;
      }

      .status-message.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .status-message.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .status-message.info {
        background: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
      }

      /* Progress View */
      .progress-view {
        display: none;
        margin-top: 30px;
      }

      .progress-view.visible {
        display: block;
      }

      /* Minimalist mode: shrink container and simplify when importing */
      .import-container.importing {
        max-width: 400px;
        padding: 30px;
        transition: all 0.3s ease;
      }

      .import-container.importing .header {
        display: none;
      }

      .import-container.importing .actions {
        display: none;
      }

      .import-container.importing .import-options {
        display: none;
      }

      .progress-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .progress-title {
        font-size: 14px;
        font-weight: 500;
        color: #666;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }

      .progress-percentage {
        font-size: 18px;
        font-weight: 600;
        color: var(--kizu-primary);
        margin-left: 12px;
      }

      .progress-bar-container {
        width: 100%;
        height: 4px;
        background: #e0e0e0;
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 0;
      }

      .progress-bar {
        height: 100%;
        background: var(--kizu-primary);
        transition: width 0.3s ease;
        width: 0%;
      }

      .progress-details {
        display: none;
      }

      .progress-status {
        display: none;
      }

      /* License Warning */
      .license-warning {
        background: #fff4e5;
        border: 2px solid #f57c00;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 20px;
        display: none;
      }

      .license-warning.visible {
        display: block;
      }

      .license-warning-title {
        font-size: 14px;
        font-weight: 600;
        color: #e65100;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .license-warning-text {
        font-size: 13px;
        color: #666;
        margin-bottom: 10px;
      }

      .license-warning .btn-primary {
        font-size: 13px;
        padding: 8px 16px;
      }
    </style>
  </head>
  <body>
    <div class="import-container">
      <!-- Header -->
      <div class="header">
        <h1>📥 Import Figma File</h1>
        <p>Import your Figma designs into Kizu with full compatibility</p>
      </div>

      <!-- Status Message -->
      <div id="statusMessage" class="status-message"></div>

      <!-- License Warning -->
      <div id="licenseWarning" class="license-warning">
        <div class="license-warning-title">⚠️ File Size Limit Exceeded</div>
        <div class="license-warning-text" id="licenseWarningText"></div>
        <button class="btn btn-primary" onclick="window.close()">Upgrade License</button>
      </div>

      <!-- Drop Zone -->
      <div id="dropZone" class="drop-zone">
        <div class="drop-zone-icon">📤</div>
        <div class="drop-zone-text">Drop Figma files here</div>
        <div class="drop-zone-subtext">or click to browse</div>
        <input
          type="file"
          id="fileInput"
          multiple
          accept=".kizu,.json,.fig"
          style="display: none"
        />
        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
          Browse Files
        </button>
      </div>

      <!-- File List -->
      <div id="fileList" class="file-list">
        <h3>Selected Files (<span id="fileCount">0</span>)</h3>
        <div id="fileItems"></div>
      </div>

      <!-- Import Options -->
      <div class="import-options">
        <h3>Import Options</h3>
        <div class="option-item">
          <input type="checkbox" id="optionComponents" checked />
          <label for="optionComponents">Import as component library</label>
        </div>
        <div class="option-item">
          <input type="checkbox" id="optionPreserveNames" checked />
          <label for="optionPreserveNames">Preserve layer names</label>
        </div>
        <div class="option-item">
          <input type="checkbox" id="optionPrototyping" />
          <label for="optionPrototyping">Convert prototyping (beta)</label>
        </div>
      </div>

      <!-- Progress View -->
      <div id="progressView" class="progress-view">
        <div class="progress-header">
          <div class="progress-title">Importing...</div>
          <div class="progress-percentage" id="progressPercentage">0%</div>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-details" id="progressDetails">Preparing import...</div>
        <div class="progress-status" id="progressStatus">Status: Initializing</div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn btn-secondary" onclick="window.close()">Cancel</button>
        <button class="btn btn-primary" id="importBtn" onclick="startImport()" disabled>
          Import Files
        </button>
      </div>
    </div>

    <script src="import-figma.js"></script>
  </body>
</html>
