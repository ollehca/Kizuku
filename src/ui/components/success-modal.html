<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Kizuku</title>
    <link rel="stylesheet" href="success-modal.css" />
  </head>
  <body>
    <div class="modal-overlay">
      <div class="modal-container">
        <!-- Success Icon -->
        <div class="success-icon">
          <svg class="checkmark" viewBox="0 0 52 52">
            <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none" />
            <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
          </svg>
        </div>

        <!-- Content -->
        <div class="modal-content">
          <h1 class="modal-title">Welcome to Kizuku! <span class="kanji">築く</span></h1>
          <p class="modal-message">Your account has been created successfully</p>

          <div class="account-summary">
            <div class="summary-row">
              <span class="summary-label">Username</span>
              <span class="summary-value" id="username">johndoe</span>
            </div>
            <div class="summary-row">
              <span class="summary-label">License</span>
              <span class="summary-value license-badge" id="license-type">Private</span>
            </div>
          </div>

          <div class="next-steps">
            <h3>What's Next?</h3>
            <ul>
              <li>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                </svg>
                <span>Start creating amazing designs</span>
              </li>
              <li>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                  <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Explore the dashboard and tools</span>
              </li>
              <li>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"></circle>
                  <path d="M12 16v-4M12 8h.01"></path>
                </svg>
                <span>Check out the help center if you need assistance</span>
              </li>
            </ul>
          </div>
        </div>

        <!-- Action -->
        <div class="modal-actions">
          <button class="btn btn-primary" id="btn-get-started">Get Started</button>
        </div>
      </div>
    </div>

    <script src="success-modal.js"></script>
  </body>
</html>
